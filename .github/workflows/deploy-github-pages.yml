# Build & publish the static site under `site/` to GitHub Pages.
#
# Repo Settings → Pages:
#   • Build and deployment → Source: **GitHub Actions**
#   • After the first successful run, set **Custom domain** to visualprompt.io
#     (enforce HTTPS once DNS verifies).
#
# This repository intentionally keeps docs at the repo root; only `site/` is published.
#
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

concurrency:
  group: gh-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
